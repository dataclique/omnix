name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix flake check

  examples:
    name: "Example: ${{ matrix.example }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - example-minimal
          - example-single-service
          - example-full
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Evaluate NixOS configuration
        run: nix eval .#nixosConfigurations.${{ matrix.example }}.config.system.build.toplevel.drvPath

      - name: Build NixOS configuration (dry-run)
        run: nix build .#nixosConfigurations.${{ matrix.example }}.config.system.build.toplevel --dry-run
