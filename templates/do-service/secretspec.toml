# secretspec manifest — declares WHAT secrets this project needs.
#
# Scope: local development only. `secretspec` (in the dev shell) gives you a
# typed, declarative local-secrets workflow:
#
#   secretspec config init          # one-time: pick a local provider (keyring/dotenv)
#   secretspec check                # prompt for any missing secrets
#   secretspec run -- my-service    # run with secrets injected as env vars
#
# This file is NOT the at-rest store for deployed hosts. On servers, secrets are
# age-encrypted to keys.nix roles and decrypted on-host (ragenix today, the
# omnix-age CLI later); services read their config from files, not env vars. A
# custom age-backed secretspec provider is not feasible (its provider registry
# is crate-private), so secretspec stays a dev/declaration tool here.
#
# See SPEC.md "Future" and ROADMAP.md.

[project]
name = "my-service"
revision = "1.0"

[profiles.default]
DATABASE_URL = { description = "Database connection string", required = true }
API_TOKEN = { description = "Upstream API token", required = true }

[profiles.development]
# Inherits default's secrets; override values/settings for local dev here.
DATABASE_URL = { description = "Database connection string", default = "sqlite://./my-service.db?mode=rwc" }

[profiles.production]
# Inherits default's required secrets. Real values are provided on-host via age,
# not secretspec — see the header note.
