name: Integration Test

on:
  workflow_dispatch:
    inputs:
      droplet_size:
        description: "DigitalOcean droplet size"
        default: "s-1vcpu-2gb"
        type: string
      region:
        description: "DigitalOcean region"
        default: "nyc3"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-test
  cancel-in-progress: false

jobs:
  test:
    name: Full lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TF_VAR_droplet_size: ${{ inputs.droplet_size }}
      TF_VAR_region: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Setup SSH identity
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Terraform init and apply
        run: |
          nix run .#tfInit -- -i ~/.ssh/id_ed25519
          nix run .#tfPlan -- -i ~/.ssh/id_ed25519
          nix run .#tfApply -- -i ~/.ssh/id_ed25519

      - name: Resolve host IP
        run: |
          HOST_IP=$(nix run .#resolveIp -- -i ~/.ssh/id_ed25519 2>/dev/null)
          echo "::add-mask::$HOST_IP"
          echo "HOST_IP=$HOST_IP" >> "$GITHUB_ENV"

      - name: Wait for SSH
        run: |
          retries=0
          until ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            -i ~/.ssh/id_ed25519 "root@$HOST_IP" true 2>/dev/null; do
            retries=$((retries + 1))
            if [ "$retries" -ge 30 ]; then
              echo "SSH not available after 2.5 minutes" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Bootstrap NixOS
        run: nix run .#bootstrap -- -i ~/.ssh/id_ed25519

      - name: Deploy all
        run: nix run .#deployAll -- -i ~/.ssh/id_ed25519

      - name: Verify SSH access
        run: ssh -i ~/.ssh/id_ed25519 "root@$HOST_IP" uname -a

      - name: Verify NixOS
        run: |
          RESULT=$(ssh -i ~/.ssh/id_ed25519 "root@$HOST_IP" \
            "grep -c NixOS /etc/os-release")
          if [ "$RESULT" -lt 1 ]; then
            echo "Host is not running NixOS" >&2
            exit 1
          fi

      - name: Teardown
        if: always()
        run: nix run .#tfDestroy -- -i ~/.ssh/id_ed25519 || true

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
